<section id="skills">
  <div class="container">
    <div class="section-header">
      <span class="section-num">02</span>
      <h2 class="section-title">{{ ts.t('skills_title') }} <span class="accent">{{ ts.t('skills_title_accent') }}</span></h2>
      <div class="section-divider"></div>
    </div>

    @for (category of data.skills; track category.category) {
      <div class="skills-category">
        <div class="skills-cat-label">{{ ts.skillCategoryName(category.category) }}</div>
        <div class="skills-row">
          @for (item of category.items; track item.name) {
            <div class="skill-card">
              <img [src]="item.icon" [alt]="item.name" loading="lazy">
              <span class="skill-name">{{ item.name }}</span>
            </div>
          }
        </div>
      </div>
    }
  </div>
</section>
