<div id="scroll-progress"></div>

<nav id="navbar">
  <div class="nav-inner">
    <a href="#hero" class="nav-logo" (click)="scrollTo('hero', $event)">
      LB<span class="accent">.</span>
    </a>

    <ul class="nav-links">
      @for (item of navItems(); track item.id) {
        <li>
          <a [href]="'#' + item.id" class="nav-link" (click)="scrollTo(item.id, $event)">
            {{ item.label }}
          </a>
        </li>
      }
    </ul>

    <div class="nav-right">
      <button class="lang-toggle" (click)="ts.toggle()" [attr.aria-label]="ts.lang() === 'en' ? 'Switch to German' : 'Switch to English'">
        <span [class.active]="ts.lang() === 'en'">EN</span>
        <span class="lang-sep">|</span>
        <span [class.active]="ts.lang() === 'de'">DE</span>
      </button>

      <a href="mailto:info@lyonelberzen.dev" class="nav-cta">
        <span>{{ ts.t('nav_hire') }}</span>
      </a>
    </div>

    <button
      class="nav-burger"
      [class.open]="mobileOpen()"
      (click)="toggleMobile()"
      aria-label="Toggle menu"
    >
      <span></span><span></span><span></span>
    </button>
  </div>

  <!-- Mobile Menu -->
  <div class="nav-mobile-menu" [class.open]="mobileOpen()">
    <ul>
      @for (item of navItems(); track item.id) {
        <li>
          <a [href]="'#' + item.id" (click)="scrollTo(item.id, $event)">{{ item.label }}</a>
        </li>
      }
    </ul>
    <button class="lang-toggle lang-toggle--mobile" (click)="ts.toggle()">
      <span [class.active]="ts.lang() === 'en'">EN</span>
      <span class="lang-sep">|</span>
      <span [class.active]="ts.lang() === 'de'">DE</span>
    </button>
  </div>
</nav>
