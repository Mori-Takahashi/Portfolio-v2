<section id="about">
  <div class="container">
    <div class="section-header">
      <span class="section-num">01</span>
      <h2 class="section-title">{{ ts.t('about_title') }} <span class="accent">{{ ts.t('about_title_accent') }}</span></h2>
      <div class="section-divider"></div>
    </div>

    <div class="about-grid">
      <div class="about-left">
        <p class="about-lead">{{ ts.t('bio') }}</p>
        <p class="about-body">{{ ts.t('bio2') }}</p>
        <div class="about-tags">
          @for (tag of ts.tags(); track tag) {
            <span class="tag">{{ tag }}</span>
          }
        </div>
      </div>

      <div class="about-right">
        <div class="stats-grid">
          @for (stat of data.stats; track stat.label; let i = $index) {
            <div class="stat-card">
              <div>
                <span class="stat-number" [attr.data-target]="stat.value">0</span>
                <span class="stat-suffix">{{ stat.suffix }}</span>
              </div>
              <span class="stat-label">{{ ts.statsLabels()[i] }}</span>
            </div>
          }
        </div>
      </div>
    </div>
  </div>
</section>
